<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Brasa & Maíz · Menú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--char:#1c1512;--ember:#d5622d;--cream:#f6efe4;--cream-2:#efe4d2;--muted:#7c6c5f;--line:#e3d6c3;--card:#fffdf9;--ink:#2a201b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Manrope",sans-serif;color:var(--ink);background:var(--cream);line-height:1.5;-webkit-text-size-adjust:100%}
  h1,h2,.disp{font-family:"Fraunces",serif}
  .top{background:var(--char);color:var(--cream);text-align:center;padding:30px 20px 26px}
  .top .brand{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--ember)}
  .top h1{font-family:"Fraunces";font-weight:600;font-size:38px;margin:6px 0 2px}
  .top h1 .amp{font-style:italic;color:var(--ember)}
  .top .tag{font-family:"Fraunces";font-style:italic;font-size:15px;color:var(--cream-2)}
  .actions{max-width:560px;margin:-16px auto 20px;padding:0 16px;display:flex;gap:10px;position:relative;z-index:2}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:12px;font-weight:700;font-size:13.5px;text-decoration:none;border:none}
  .btn-p{background:var(--ember);color:#fff}
  .btn-g{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px}
  .cat{margin-top:22px}
  .cat h2{font-size:23px;font-weight:600;border-bottom:2px solid var(--line);padding-bottom:8px;margin-bottom:6px}
  .dish{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px dashed var(--line)}
  .dish:last-child{border-bottom:none}
  .dish .n{font-family:"Fraunces";font-weight:600;font-size:16px}
  .dish .d{font-size:12.5px;color:var(--muted);margin-top:3px}
  .dish .p{font-family:"Fraunces";font-weight:600;font-size:16px;color:var(--ember);white-space:nowrap}
  .info{margin:26px 0 0;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px;font-size:13.5px}
  .info .r{display:flex;gap:10px;padding:7px 0}
  .info svg{flex:none;color:var(--ember)}
  .made{background:var(--char);color:var(--cream);text-align:center;padding:24px 20px 28px;margin-top:26px}
  .made .disp{font-size:14px;color:var(--ember)}
  .made p{font-size:12.5px;color:var(--cream-2);max-width:32ch;margin:6px auto 12px}
  .made a{display:inline-block;background:var(--ember);color:#fff;text-decoration:none;font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px}
  .made .h{margin-top:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8a7568}
</style>
</head>
<body>
<div class="top">
  <div class="brand">Cocina de humo · Saltillo</div>
  <h1>Brasa <span class="amp">&amp;</span> Maíz</h1>
  <div class="tag">Del comal a tu mesa</div>
</div>
<div class="actions">
  <a class="btn btn-p" id="wa">WhatsApp</a>
  <a class="btn btn-g" id="mapa" target="_blank" rel="noopener">Ubicación</a>
</div>
<div class="wrap" id="menu"></div>
<div class="wrap">
  <div class="info">
    <div class="r"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg><div>Blvd. V. Carranza 2200, Saltillo</div></div>
    <div class="r"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div>Mar a Dom · 1:00 – 11:00 pm</div></div>
  </div>
</div>
<div class="made">
  <div class="disp">Menú digital · versión Básica</div>
  <p>Demostración por Solida Aplicaciones. La versión más sencilla, ideal para empezar.</p>
  <a href="https://wa.me/528443604349?text=Hola%20Solida%20%F0%9F%91%8B%20Vi%20la%20demo%20de%20men%C3%BA%20(b%C3%A1sico)%20y%20me%20interesa.">Quiero una así</a>
  <div class="h">▸ Demostración ◂</div>
</div>
<script>
document.getElementById('mapa').href="https://maps.google.com/?q=Blvd+Venustiano+Carranza+2200+Saltillo";
document.getElementById('wa').href="https://wa.me/528443604349?text="+encodeURIComponent("Hola, quiero información / reservar en Brasa & Maíz.");
const MENU={
 "Para empezar":[["Guacamole al molcajete","Aguacate, chile de árbol, totopos de maíz azul.","$135"],["Esquites de la casa","Elote, epazote, chipotle y cotija.","$95"]],
 "Del comal":[["Tacos de arrachera","Res al carbón, cebollita y guacamole. Orden de 3.","$185"],["Gringa al pastor","Pastor, piña asada, queso y morita.","$130"]],
 "Principales":[["Rib eye al mezquite","400 g, papa rústica y esquites.","$395"],["Pollo al carbón","Medio pollo al achiote, arroz y charros.","$220"]],
 "Bebidas":[["Agua de horchata","Arroz, canela y vainilla.","$45"],["Café de olla","Piloncillo, canela y café de Veracruz.","$50"]],
 "Postres":[["Flan de cajeta","Con cajeta y nuez garapiñada.","$85"],["Churros rellenos","Cajeta o chocolate.","$75"]]
};
document.getElementById('menu').innerHTML=Object.entries(MENU).map(([c,items])=>
 `<div class="cat"><h2>${c}</h2>${items.map(([n,d,p])=>`<div class="dish"><div><div class="n">${n}</div><div class="d">${d}</div></div><div class="p">${p}</div></div>`).join('')}</div>`).join('');
</script>
</body>
</html>
